name: 正常点火测试
description: 验证正常点火流程三步骤
steps:
- id: S01
  name: 设置点火时间120s
  command: TCHEDTTA106
  params: 00000078
  expect:
  - type: slow_frame
    timeout: 5
    checks:
    - param: TMHEDTT2079
      operator: eq
      value: 120
- id: S02
  name: 切换流量控制
  command: TCHEDTTA016_1
  params: 压传闭环
  expect:
  - type: slow_frame
    timeout: 5
    checks:
      logic: and
      conditions:
      - param: TMHEDT2023
        operator: eq
        value: 压传闭环
      - param: TMHEDT2024
        operator: eq
        value: PID
- id: S03
  name: 切换点火模式
  command: TCHEDTTA003_2
  params: 推进模式
  anchors:
  - name: t0
    type: command_sent
  timeline:
  - at: +0s
    from: t0
    checks:
    - param: TMHEDTT1005
      operator: eq
      value: 推进模式
    - param: TMHEDTT1006
      operator: eq
      value: 下游供气管路放气/阴极0.8A加热
  - at: +10s
    from: t0
    checks:
    - param: TMHEDTT1006
      operator: eq
      value: 贮供流量调节阶段/阴极1.5A加热
